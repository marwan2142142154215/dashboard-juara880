<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Juara88 Staff Management</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#FFB800;
  --gold2:#FF8C00;
  --dark:#0a0a0a;
  --dark2:#111;
  --dark3:#1a1a1a;
  --text:#f0f0f0;
  --sub:#999;
  --radius:12px;
  --tab-h:56px;
  --header-h:64px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Rajdhani',sans-serif;background:var(--dark);color:var(--text);display:flex;flex-direction:column;}

#bg{position:fixed;inset:0;background-size:cover;background-position:center;opacity:.07;pointer-events:none;z-index:0;}

.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;}

header{
  display:flex;align-items:center;gap:12px;
  padding:0 16px;
  height:var(--header-h);
  flex-shrink:0;
  background:linear-gradient(135deg,rgba(0,0,0,.97),rgba(18,12,0,.97));
  border-bottom:2px solid var(--gold);
  box-shadow:0 2px 30px rgba(255,184,0,.18);
}
header img{height:40px;width:auto;object-fit:contain;}
.hd-text h1{font-family:'Orbitron',sans-serif;font-size:clamp(.85rem,2.5vw,1.2rem);font-weight:900;color:var(--gold);letter-spacing:2px;line-height:1;}
.hd-text p{font-size:clamp(.55rem,1.5vw,.7rem);color:var(--sub);letter-spacing:3px;text-transform:uppercase;margin-top:2px;}
.hd-clock{margin-left:auto;text-align:right;flex-shrink:0;}
.hd-clock .t{font-family:'Orbitron',sans-serif;font-size:clamp(.9rem,2.5vw,1.3rem);color:var(--gold);font-weight:700;line-height:1;}
.hd-clock .d{font-size:clamp(.55rem,1.5vw,.7rem);color:var(--sub);margin-top:2px;}

.tabs{display:flex;background:var(--dark2);border-bottom:1px solid rgba(255,184,0,.15);flex-shrink:0;height:var(--tab-h);overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{
  flex:1;min-width:90px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  background:none;border:none;border-bottom:3px solid transparent;
  color:var(--sub);cursor:pointer;transition:all .25s;
  font-family:'Orbitron',sans-serif;font-size:clamp(.5rem,1.5vw,.65rem);letter-spacing:1px;
  padding:0 8px;
  -webkit-user-select:none;user-select:none;
}
.tab-btn .icon{font-size:1.1rem;}
.tab-btn:hover,.tab-btn.active{color:var(--gold);background:rgba(255,184,0,.05);}
.tab-btn.active{border-bottom-color:var(--gold);}
.tab-btn .bdg{background:var(--gold);color:#000;font-size:.55rem;padding:1px 5px;border-radius:8px;font-family:'Rajdhani',sans-serif;font-weight:700;}

.layers{flex:1;overflow:hidden;position:relative;}
.layer{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:16px;display:none;scrollbar-width:thin;scrollbar-color:var(--gold) var(--dark2);}
.layer::-webkit-scrollbar{width:3px;}
.layer::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px;}
.layer.active{display:block;animation:fi .3s ease;}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.sec-title{
  font-family:'Orbitron',sans-serif;font-size:.7rem;color:var(--gold);
  letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(to right,rgba(255,184,0,.35),transparent);}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px;}
.stat-card{
  background:linear-gradient(135deg,var(--dark2),var(--dark3));
  border:1px solid rgba(255,184,0,.18);border-radius:var(--radius);
  padding:14px 12px;text-align:center;position:relative;overflow:hidden;
  transition:transform .25s,box-shadow .25s;
}
.stat-card:active{transform:scale(.97);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--gold),var(--gold2));}
.stat-card .lbl{font-size:.65rem;color:var(--sub);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.stat-card .val{font-family:'Orbitron',sans-serif;font-size:1.9rem;font-weight:900;color:var(--gold);line-height:1;}
.stat-card .sub{font-size:.7rem;color:var(--sub);margin-top:3px;}

.chart-box{background:linear-gradient(135deg,var(--dark2),var(--dark3));border:1px solid rgba(255,184,0,.18);border-radius:var(--radius);padding:16px;margin-bottom:16px;overflow-x:auto;}
.bars-wrap{display:flex;align-items:flex-end;gap:clamp(6px,2vw,18px);height:150px;min-width:280px;padding:6px 0;}
.bar-grp{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;}
.bar-row{width:100%;display:flex;gap:3px;justify-content:center;align-items:flex-end;height:130px;}
.bar{flex:1;max-width:28px;border-radius:5px 5px 0 0;transition:height .7s cubic-bezier(.25,.46,.45,.94);cursor:pointer;position:relative;}
.bar.p{background:linear-gradient(to top,#FF8C00,#FFB800);}
.bar.s{background:linear-gradient(to top,#cc6600,#ff9922);}
.bar.m{background:linear-gradient(to top,#886600,#ccaa00);}
.bar-lbl{font-size:.62rem;color:var(--sub);text-align:center;}
.bar-lbl.today{color:var(--gold);}
.legend{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;}
.leg-i{display:flex;align-items:center;gap:5px;font-size:.73rem;color:var(--sub);}
.leg-dot{width:9px;height:9px;border-radius:2px;}
.leg-dot.p{background:#FFB800;}.leg-dot.s{background:#ff9922;}.leg-dot.m{background:#ccaa00;}

.jd-chart-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.jd-chart-item{flex:1;min-width:80px;background:var(--dark);border:1px solid rgba(255,184,0,.13);border-radius:8px;padding:10px 8px;text-align:center;}
.jd-chart-item .n{font-family:'Orbitron',sans-serif;font-size:1.4rem;font-weight:900;color:var(--gold);}
.jd-chart-item .l{font-size:.65rem;color:var(--sub);margin-top:2px;}
.jd-shift-lbl{font-size:.68rem;color:var(--sub);letter-spacing:2px;margin-bottom:6px;}

.shift-sec{margin-bottom:22px;}
.shift-hdr{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;margin-bottom:12px;
  background:linear-gradient(135deg,rgba(255,184,0,.09),rgba(255,140,0,.04));
  border-left:4px solid var(--gold);border-radius:0 8px 8px 0;
}
.shift-hdr h3{font-family:'Orbitron',sans-serif;font-size:.75rem;color:var(--gold);letter-spacing:2px;}
.shift-hdr .st{font-size:.68rem;color:var(--sub);margin-left:auto;}
.sh-cnt{background:var(--gold);color:#000;font-weight:700;font-size:.68rem;padding:2px 9px;border-radius:16px;}

.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
@media(max-width:400px){.staff-grid{grid-template-columns:1fr;}}
.staff-card{
  background:linear-gradient(135deg,var(--dark2),var(--dark3));
  border:1px solid rgba(255,184,0,.13);border-radius:10px;
  padding:12px 14px;display:flex;align-items:center;gap:10px;
  transition:all .25s;position:relative;overflow:hidden;
}
.staff-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--gold),var(--gold2));}
.staff-card:active{transform:scale(.98);}
.ava{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:.9rem;flex-shrink:0;font-family:'Orbitron',sans-serif;}
.si .nm{font-weight:700;font-size:.9rem;}
.si .jd{font-size:.7rem;color:var(--gold);background:rgba(255,184,0,.1);padding:2px 8px;border-radius:4px;margin-top:3px;display:inline-block;border:1px solid rgba(255,184,0,.2);}

.ref-note{font-size:.72rem;color:var(--sub);text-align:center;margin-bottom:14px;padding:8px;background:rgba(255,184,0,.05);border-radius:8px;border:1px solid rgba(255,184,0,.1);}

.lock-wrap{max-width:380px;margin:40px auto;text-align:center;padding:0 8px;}
.lock-ico{width:72px;height:72px;background:rgba(255,184,0,.12);border:2px solid rgba(255,184,0,.35);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 16px;}
.lock-wrap h2{font-family:'Orbitron',sans-serif;color:var(--gold);font-size:1rem;letter-spacing:3px;margin-bottom:6px;}
.lock-wrap p{color:var(--sub);font-size:.82rem;margin-bottom:22px;}
.inp{width:100%;background:var(--dark2);border:1px solid rgba(255,184,0,.3);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:1rem;padding:12px 14px;border-radius:8px;outline:none;transition:border-color .25s;margin-bottom:12px;}
.inp:focus{border-color:var(--gold);box-shadow:0 0 16px rgba(255,184,0,.13);}
.btn-g{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .25s;}
.btn-g:active{transform:scale(.97);}
.err{color:#ff4444;font-size:.78rem;margin-top:6px;display:none;}

.adm-panel{display:none;}
.adm-panel.show{display:block;animation:fi .35s ease;}
.adm-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;}
.adm-card{background:linear-gradient(135deg,var(--dark2),var(--dark3));border:1px solid rgba(255,184,0,.18);border-radius:14px;padding:18px;}
.adm-card h3{font-family:'Orbitron',sans-serif;font-size:.72rem;color:var(--gold);letter-spacing:2px;margin-bottom:14px;}
.wide{grid-column:1/-1;}

.fr{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.fi,.fsel{flex:1;min-width:0;background:var(--dark);border:1px solid rgba(255,184,0,.22);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:.9rem;padding:10px 12px;border-radius:8px;outline:none;transition:border-color .25s;}
.fi:focus,.fsel:focus{border-color:var(--gold);}
.fsel option{background:#111;}
.btn-s{padding:10px 14px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.65rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .25s;flex-shrink:0;}
.btn-s:active{transform:scale(.96);}

.lst{max-height:220px;overflow-y:auto;margin-top:8px;scrollbar-width:thin;scrollbar-color:var(--gold) var(--dark);}
.lst::-webkit-scrollbar{width:3px;}
.lst::-webkit-scrollbar-thumb{background:var(--gold);}
.li{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:var(--dark);border-radius:7px;margin-bottom:7px;border:1px solid rgba(255,184,0,.09);}
.li .ln{font-weight:600;font-size:.88rem;}
.li .lm{font-size:.72rem;color:var(--sub);}
.btn-d{background:none;border:1px solid rgba(255,60,0,.4);color:#ff6644;font-size:.72rem;padding:3px 9px;border-radius:5px;cursor:pointer;font-family:'Rajdhani',sans-serif;transition:all .2s;}
.btn-d:active{background:rgba(255,60,0,.2);}

.q-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,184,0,.07);}
.q-row label{flex:1;font-size:.82rem;color:var(--sub);}
.q-in{width:48px;text-align:center;background:var(--dark);border:1px solid rgba(255,184,0,.22);color:var(--text);padding:5px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:.9rem;outline:none;}
.q-in:focus{border-color:var(--gold);}

.toast{position:fixed;bottom:20px;right:16px;background:var(--gold);color:#000;font-family:'Orbitron',sans-serif;font-size:.7rem;font-weight:700;padding:11px 18px;border-radius:8px;z-index:9999;transform:translateY(70px);opacity:0;transition:all .35s cubic-bezier(.25,.46,.45,.94);letter-spacing:1px;max-width:calc(100vw - 32px);word-break:break-word;}
.toast.show{transform:translateY(0);opacity:1;}

.logout-btn{padding:6px 14px;background:none;border:1px solid rgba(255,184,0,.3);color:var(--sub);font-family:'Orbitron',sans-serif;font-size:.6rem;cursor:pointer;border-radius:6px;margin-bottom:16px;letter-spacing:1px;transition:all .2s;}
.logout-btn:active{background:rgba(255,184,0,.1);color:var(--gold);}

@media(min-width:768px){
  :root{--header-h:70px;--tab-h:60px;}
  .layer{padding:22px 28px;}
  .stats-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;}
  .bars-wrap{gap:22px;height:180px;}
  .bar-row{height:155px;}
  .bar{max-width:36px;}
  .staff-grid{gap:12px;}
}
@media(min-width:1200px){
  .layer{padding:28px 40px;}
  header{padding:0 28px;}
  .stats-grid{grid-template-columns:repeat(5,1fr);}
}
</style>
</head>
<body>
<div id="bg"></div>
<div class="app">
  <header>
    <img id="ico" src="" alt="J88">
    <div class="hd-text"><h1>JUARA88</h1><p>Staff Management</p></div>
    <div class="hd-clock"><div class="t" id="clk">--:--</div><div class="d" id="dt">--</div></div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="go(0)"><span class="icon">📊</span><span>DASHBOARD<span class="bdg" id="bdg">0</span></span></button>
    <button class="tab-btn" onclick="go(1)"><span class="icon">📋</span><span>JADWAL</span></button>
    <button class="tab-btn" onclick="go(2)"><span class="icon">⚙</span><span>ADMIN</span></button>
  </div>

  <div class="layers">
    <div class="layer active" id="l0">
      <div class="sec-title">Statistik Staf</div>
      <div class="stats-grid" id="sg"></div>
      <div class="chart-box">
        <div class="sec-title">Staf Per Shift</div>
        <div class="bars-wrap" id="bars"></div>
        <div class="legend">
          <div class="leg-i"><div class="leg-dot p"></div>Pagi</div>
          <div class="leg-i"><div class="leg-dot s"></div>Sore</div>
          <div class="leg-i"><div class="leg-dot m"></div>Malam</div>
        </div>
      </div>
      <div class="chart-box">
        <div class="sec-title">Jobdesk Per Shift</div>
        <div id="jdc"></div>
      </div>
    </div>

    <div class="layer" id="l1">
      <div class="ref-note" id="rn"></div>
      <div id="sv"></div>
    </div>

    <div class="layer" id="l2">
      <div class="lock-wrap" id="lk">
        <div class="lock-ico">🔐</div>
        <h2>AKSES ADMIN</h2>
        <p>Masukkan password admin</p>
        <input class="inp" type="password" id="pwi" placeholder="Password..." onkeyup="if(event.key==='Enter')chk()">
        <button class="btn-g" onclick="chk()">MASUK</button>
        <div class="err" id="pwe">⚠ Password salah</div>
      </div>

      <div class="adm-panel" id="ap">
        <button class="logout-btn" onclick="logout()">◀ KELUAR ADMIN</button>
        <div class="adm-grid">

          <div class="adm-card">
            <h3>➕ TAMBAH STAF</h3>
            <div class="fr"><input class="fi" type="text" id="sni" placeholder="Nama Staf..."></div>
            <div class="fr">
              <select class="fsel" id="ssi">
                <option value="Pagi">Shift Pagi (06:00 - 14:00)</option>
                <option value="Sore">Shift Sore (14:00 - 22:00)</option>
                <option value="Malam">Shift Malam (22:00 - 06:00)</option>
              </select>
            </div>
            <div class="fr"><button class="btn-s" style="width:100%" onclick="addStaff()">TAMBAH</button></div>
            <div class="sec-title" style="font-size:.62rem;margin-top:12px;">Daftar Staf</div>
            <div class="lst" id="sl"></div>
          </div>

          <div class="adm-card">
            <h3>📋 KELOLA JOBDESK</h3>
            <div class="fr">
              <input class="fi" type="text" id="jdi" placeholder="Nama Jobdesk...">
              <button class="btn-s" onclick="addJd()">TAMBAH</button>
            </div>
            <div class="sec-title" style="font-size:.62rem;margin-top:12px;">Daftar Jobdesk</div>
            <div class="lst" id="jl"></div>
          </div>

          <div class="adm-card wide">
            <h3>⚖ KUOTA JOBDESK PER SHIFT</h3>
            <div id="qs"></div>
          </div>

          <div class="adm-card wide">
            <h3>🔑 GANTI PASSWORD</h3>
            <div class="fr" style="flex-wrap:wrap;gap:8px;">
              <input class="fi" type="password" id="op" placeholder="Password Lama...">
              <input class="fi" type="password" id="np" placeholder="Password Baru...">
              <input class="fi" type="password" id="cp" placeholder="Konfirmasi Baru...">
              <button class="btn-s" onclick="chgPass()">GANTI</button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="tst"></div>

<script>
let D = JSON.parse(localStorage.getItem('j88') || JSON.stringify({
  staff:[
    {id:1,name:'Andi Pratama',shift:'Pagi'},
    {id:2,name:'Budi Santoso',shift:'Pagi'},
    {id:3,name:'Citra Dewi',shift:'Pagi'},
    {id:4,name:'Dian Nugroho',shift:'Pagi'},
    {id:5,name:'Eka Putri',shift:'Pagi'},
    {id:6,name:'Fara Indah',shift:'Sore'},
    {id:7,name:'Gilang Saputra',shift:'Sore'},
    {id:8,name:'Hendra Wijaya',shift:'Sore'},
    {id:9,name:'Irma Sari',shift:'Sore'},
    {id:10,name:'Joko Susilo',shift:'Malam'},
    {id:11,name:'Kiki Rahayu',shift:'Malam'},
    {id:12,name:'Lila Amara',shift:'Malam'}
  ],
  jobs:['Kasir','Customer Service','Supervisor'],
  quotas:{},
  sched:{},
  schedDate:'',
  pass:'obyindra'
}));

function save(){localStorage.setItem('j88',JSON.stringify(D));}

function today(){const d=new Date();return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();}

function hash(s){let h=0;for(let i=0;i<s.length;i++)h=Math.imul(31,h)+s.charCodeAt(i)|0;return h>>>0;}

function rng(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;let t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

function shuffle(a,r){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(r()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function genSched(){
  const t=today();
  if(D.schedDate===t&&Object.keys(D.sched).length>0)return;
  const r=rng(hash(new Date().toDateString()));
  const shifts=['Pagi','Sore','Malam'];
  const ns={};
  shifts.forEach(sh=>{
    const st=D.staff.filter(x=>x.shift===sh);
    if(!st.length||!D.jobs.length){ns[sh]=[];return;}
    let slots=[];
    D.jobs.forEach(j=>{
      const k=j+'__'+sh;
      const q=D.quotas[k]||D.quotas[j]||1;
      for(let i=0;i<q;i++)slots.push(j);
    });
    slots=shuffle(slots,r);
    const ss=shuffle([...st],r);
    ns[sh]=ss.map((s,i)=>({id:s.id,name:s.name,job:slots[i%slots.length]||D.jobs[0]}));
  });
  D.sched=ns;D.schedDate=t;save();
}

function renderDash(){
  const shifts=['Pagi','Sore','Malam'];
  const cnt={};shifts.forEach(s=>cnt[s]=D.staff.filter(x=>x.shift===s).length);
  const tot=D.staff.length;
  document.getElementById('bdg').textContent=tot;
  document.getElementById('sg').innerHTML=
    `<div class="stat-card"><div class="lbl">Total Staf</div><div class="val">${tot}</div><div class="sub">Semua Shift</div></div>`+
    shifts.map(s=>`<div class="stat-card"><div class="lbl">Shift ${s}</div><div class="val">${cnt[s]}</div><div class="sub">${s==='Pagi'?'06-14':s==='Sore'?'14-22':'22-06'}</div></div>`).join('')+
    `<div class="stat-card"><div class="lbl">Jobdesk</div><div class="val">${D.jobs.length}</div><div class="sub">Posisi</div></div>`;

  const mx=Math.max(...Object.values(cnt),1);
  const days=['Sen','Sel','Rab','Kam','Jum','Sab','Min'];
  const td=new Date().getDay();const tdi=td===0?6:td-1;
  const r=rng(hash('bars'));
  document.getElementById('bars').innerHTML=days.map((d,i)=>{
    const it=i===tdi;
    return`<div class="bar-grp"><div class="bar-row">`+
      shifts.map((s,j)=>{const v=cnt[s];const h=Math.round((v/mx)*(it?140:Math.round(140*(0.5+r()*0.5))));return`<div class="bar ${['p','s','m'][j]}" style="height:${h}px"></div>`;}).join('')+
      `</div><div class="bar-lbl${it?' today':''}">${d}${it?'●':''}</div></div>`;
  }).join('');

  document.getElementById('jdc').innerHTML=shifts.map(sh=>{
    const sc=D.sched[sh]||[];
    const jc={};sc.forEach(x=>{jc[x.job]=(jc[x.job]||0)+1;});
    return`<div style="margin-bottom:14px"><div class="jd-shift-lbl">SHIFT ${sh.toUpperCase()}</div><div class="jd-chart-row">`+
      D.jobs.map(j=>`<div class="jd-chart-item"><div class="n">${jc[j]||0}</div><div class="l">${j}</div></div>`).join('')+
      `</div></div>`;
  }).join('');
}

function renderSched(){
  genSched();
  const shifts=[{k:'Pagi',l:'SHIFT PAGI',t:'06:00–14:00'},{k:'Sore',l:'SHIFT SORE',t:'14:00–22:00'},{k:'Malam',l:'SHIFT MALAM',t:'22:00–06:00'}];
  document.getElementById('sv').innerHTML=shifts.map(s=>{
    const sc=D.sched[s.k]||[];
    return`<div class="shift-sec"><div class="shift-hdr"><h3>${s.l}</h3><span class="sh-cnt">${sc.length}</span><span class="st">${s.t}</span></div><div class="staff-grid">`+
      (sc.length?sc.map(st=>{const in2=st.name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();return`<div class="staff-card"><div class="ava">${in2}</div><div class="si"><div class="nm">${st.name}</div><div class="jd">${st.job||'-'}</div></div></div>`;}).join('')
      :`<div style="color:var(--sub);font-size:.83rem;padding:10px">Belum ada staf</div>`)+
      `</div></div>`;
  }).join('');
  const tom=new Date();tom.setDate(tom.getDate()+1);tom.setHours(0,0,0,0);
  const diff=tom-new Date();const h=Math.floor(diff/3600000);const m=Math.floor((diff%3600000)/60000);
  document.getElementById('rn').textContent=`🔄 Auto-acak berikutnya dalam ${h}j ${m}m`;
}

function renderAdm(){
  document.getElementById('sl').innerHTML=D.staff.map(s=>`<div class="li"><div><div class="ln">${s.name}</div><div class="lm">Shift ${s.shift}</div></div><button class="btn-d" onclick="rmStaff(${s.id})">Hapus</button></div>`).join('')||'<div style="color:var(--sub);font-size:.83rem">Belum ada staf</div>';
  document.getElementById('jl').innerHTML=D.jobs.map((j,i)=>`<div class="li"><div><div class="ln">${j}</div><div class="lm">Default kuota: ${D.quotas[j]||1}</div></div><button class="btn-d" onclick="rmJd(${i})">Hapus</button></div>`).join('')||'<div style="color:var(--sub);font-size:.83rem">Belum ada jobdesk</div>';
  const shifts=['Pagi','Sore','Malam'];
  document.getElementById('qs').innerHTML=D.jobs.map(j=>`<div style="margin-bottom:14px"><div style="font-size:.82rem;color:var(--gold);font-weight:600;margin-bottom:6px">${j}</div><div style="display:flex;gap:10px;flex-wrap:wrap">`+shifts.map(sh=>{const k=j+'__'+sh;const v=D.quotas[k]||D.quotas[j]||1;return`<div class="q-row" style="flex:1;min-width:120px"><label>${sh}</label><input class="q-in" type="number" min="1" max="20" value="${v}" onchange="setQ('${j}','${sh}',this.value)"></div>`;}).join('')+`</div></div>`).join('')||'<div style="color:var(--sub);font-size:.83rem">Tambahkan jobdesk dulu</div>';
}

function setQ(j,sh,v){D.quotas[j+'__'+sh]=parseInt(v)||1;D.schedDate='';save();toast('Kuota diperbarui!');}

function addStaff(){
  const n=document.getElementById('sni').value.trim();
  const sh=document.getElementById('ssi').value;
  if(!n){toast('Masukkan nama staf!');return;}
  D.staff.push({id:Date.now(),name:n,shift:sh});
  D.schedDate='';save();
  document.getElementById('sni').value='';
  renderAdm();renderDash();toast('Staf ditambahkan!');
}

function rmStaff(id){D.staff=D.staff.filter(s=>s.id!==id);D.schedDate='';save();renderAdm();renderDash();toast('Staf dihapus.');}

function addJd(){
  const n=document.getElementById('jdi').value.trim();
  if(!n){toast('Masukkan nama jobdesk!');return;}
  if(D.jobs.includes(n)){toast('Sudah ada!');return;}
  D.jobs.push(n);D.quotas[n]=1;D.schedDate='';save();
  document.getElementById('jdi').value='';
  renderAdm();renderDash();toast('Jobdesk ditambahkan!');
}

function rmJd(i){const rm=D.jobs.splice(i,1)[0];delete D.quotas[rm];D.schedDate='';save();renderAdm();renderDash();toast('Jobdesk dihapus.');}

function chk(){
  if(document.getElementById('pwi').value===D.pass){
    document.getElementById('lk').style.display='none';
    document.getElementById('ap').classList.add('show');
    document.getElementById('pwe').style.display='none';
    renderAdm();
  }else{
    document.getElementById('pwe').style.display='block';
    document.getElementById('pwi').value='';
  }
}

function logout(){
  document.getElementById('lk').style.display='';
  document.getElementById('ap').classList.remove('show');
  document.getElementById('pwi').value='';
}

function chgPass(){
  const o=document.getElementById('op').value;
  const n=document.getElementById('np').value;
  const c=document.getElementById('cp').value;
  if(o!==D.pass){toast('Password lama salah!');return;}
  if(!n){toast('Password baru kosong!');return;}
  if(n!==c){toast('Konfirmasi tidak cocok!');return;}
  D.pass=n;save();['op','np','cp'].forEach(id=>document.getElementById(id).value='');
  toast('Password berhasil diubah!');
}

function go(i){
  document.querySelectorAll('.layer').forEach((l,j)=>l.classList.toggle('active',j===i));
  document.querySelectorAll('.tab-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  if(i===0)renderDash();
  if(i===1)renderSched();
  if(i===2&&document.getElementById('ap').classList.contains('show'))renderAdm();
}

function toast(msg){const t=document.getElementById('tst');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

function tick(){
  const n=new Date();
  document.getElementById('clk').textContent=n.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const dn=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const mn=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  document.getElementById('dt').textContent=dn[n.getDay()]+', '+n.getDate()+' '+mn[n.getMonth()]+' '+n.getFullYear();
}
